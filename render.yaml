databases:
  - name: aihq-db
    plan: basic-256mb

services:
  - type: web
    name: aihq-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --timeout 180
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aihq-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CEO_USERNAME
        value: geoffrey
      - key: CEO_PASSWORD
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.3

  - type: web
    name: aihq-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

  - type: cron
    name: aihq-daily
    runtime: python
    rootDir: backend
    schedule: "0 6 * * 1-5"
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py daily_cycle
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aihq-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
