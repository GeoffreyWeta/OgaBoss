databases:
  - name: ogaboss-db
    plan: free

services:
  - type: web
    name: ogaboss-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --timeout 180
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ogaboss-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CEO_USERNAME
        value: geoffrey
      - key: CEO_PASSWORD
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.3

  - type: web
    name: ogaboss-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
